<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palimpsest Path — WordPress Deployer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0f11;
    --bg2:       #16181c;
    --bg3:       #1e2128;
    --border:    #2a2d35;
    --border2:   #3a3d48;
    --text:      #c8cdd8;
    --text2:     #7a8090;
    --text3:     #4a4f5c;
    --accent:    #4a9eff;
    --accent2:   #1a5fa8;
    --success:   #3dba6e;
    --warning:   #e8a030;
    --danger:    #e05252;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  header p {
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
  }

  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .panel-head {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-head .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .panel-body { padding: 1rem; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
    margin-top: 0.8rem;
  }

  label:first-child { margin-top: 0; }

  input[type="text"],
  input[type="password"],
  input[type="url"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0.45rem 0.6rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--accent); }

  button {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 0.55rem 1rem;
    background: var(--accent2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  button:hover { background: var(--accent); color: #fff; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  button.secondary {
    background: transparent;
    border-color: var(--border2);
    color: var(--text2);
    margin-top: 0.5rem;
  }

  button.secondary:hover { border-color: var(--text2); color: var(--text); background: transparent; }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-top: 0.8rem;
  }

  .conn-status .indicator {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }

  .conn-status.ok .indicator  { background: var(--success); }
  .conn-status.err .indicator { background: var(--danger); }
  .conn-status.ok { color: var(--success); border-color: #1a4a2e; }
  .conn-status.err { color: var(--danger); border-color: #4a1a1a; }

  .page-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .page-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 0.5rem;
    align-items: center;
    padding: 0.5rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .page-row .slug { color: var(--accent); }
  .page-row .title { color: var(--text2); font-size: 10px; grid-column: 1; }

  .page-row .status-badge {
    font-size: 10px;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    white-space: nowrap;
  }

  .badge-pending  { background: #1a1f2e; color: var(--text2); border: 1px solid var(--border2); }
  .badge-deploying{ background: #1a2a3e; color: var(--accent); border: 1px solid var(--accent2); }
  .badge-done     { background: #0d2a1a; color: var(--success); border: 1px solid #1a4a2e; }
  .badge-exists   { background: #2a1a0d; color: var(--warning); border: 1px solid #4a3010; }
  .badge-error    { background: #2a0d0d; color: var(--danger);  border: 1px solid #4a1a1a; }
  .badge-skipped  { background: #1a1a1a; color: var(--text3);   border: 1px solid var(--border); }

  .page-row .link-btn {
    display: inline-block;
    width: auto;
    margin: 0;
    padding: 0.15rem 0.4rem;
    font-size: 10px;
    border-color: var(--border2);
    color: var(--text2);
    background: transparent;
  }

  .page-row .link-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.6rem;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.8;
    color: var(--text2);
    max-height: 280px;
    overflow-y: auto;
  }

  .log .line { display: block; }
  .log .line.ok   { color: var(--success); }
  .log .line.warn { color: var(--warning); }
  .log .line.err  { color: var(--danger); }
  .log .line.info { color: var(--accent); }
  .log .line.dim  { color: var(--text3); }

  .site-fields { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.8rem; }

  .site-field-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .site-field-row span { color: var(--text2); }

  .site-field-row input {
    margin: 0;
    border: none;
    border-bottom: 1px solid var(--border2);
    border-radius: 0;
    padding: 0.1rem 0;
    font-size: 12px;
    background: transparent;
  }

  .site-field-row input:focus { border-bottom-color: var(--accent); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1rem 0;
  }

  .action-bar {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .action-bar button { flex: 1; margin: 0; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-top: 0.8rem;
    cursor: pointer;
  }

  .checkbox-row input { width: auto; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Palimpsest Path // WordPress Deployer</h1>
  <p>sidewalkcircus.org &mdash; REST API &mdash; no Jetpack plan required</p>
</header>

<div class="grid">

  <!-- LEFT PANEL: credentials + controls -->
  <div style="display: flex; flex-direction: column; gap: 1rem;">

    <div class="panel">
      <div class="panel-head"><span class="dot"></span>Connection</div>
      <div class="panel-body">
        <label>Site URL</label>
        <input type="url" id="wpUrl" value="https://sidewalkcircus.org" placeholder="https://example.com">

        <label>Username</label>
        <input type="text" id="wpUser" placeholder="WordPress username">

        <label>Application Password</label>
        <input type="password" id="wpPass" placeholder="xxxx xxxx xxxx xxxx xxxx xxxx">

        <div class="conn-status" id="connStatus">
          <span class="indicator"></span>
          <span id="connText">Not connected</span>
        </div>

        <button id="btnTest" onclick="testConnection()">Test Connection</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="dot"></span>Site Settings</div>
      <div class="panel-body">
        <p style="font-size: 11px; color: var(--text2); margin-bottom: 0.8rem;">These will be written to your WordPress site settings on deploy.</p>
        <div class="site-fields">
          <div class="site-field-row">
            <span>Title</span>
            <input type="text" id="siteTitle" value="The Palimpsest Path">
          </div>
          <div class="site-field-row">
            <span>Tagline</span>
            <input type="text" id="siteTagline" value="A community chalk art project on the Cygnet Boardwalk">
          </div>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="updateSiteSettings" checked>
          Update title &amp; tagline on deploy
        </label>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="dot"></span>Deploy Options</div>
      <div class="panel-body">
        <label class="checkbox-row">
          <input type="checkbox" id="draftOnly" checked>

          <input type="checkbox" id="skipExisting">

        </label>
        <hr class="divider">
        <div class="action-bar">
          <button id="btnDeploy" onclick="startDeploy()" disabled>Deploy All</button>

        <button class="secondary" onclick="resetStatuses()">Reset Status</button>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL: page list + log -->
  <div style="display: flex; flex-direction: column; gap: 1rem;">

    <div class="panel">
      <div class="panel-head"><span class="dot"></span>Pages &mdash; <span id="pageCount">7 pages queued</span></div>
      <div class="panel-body">
        <div class="page-list" id="pageList"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="dot"></span>Deploy Log</div>
      <div class="panel-body">
        <div class="log" id="deployLog">
          <span class="line dim">// Waiting for connection test...</span>
        </div>
      </div>
    </div>

  </div>
</div>

<h2>The idea</h2>
<p>A palimpsest is a manuscript surface that has been written on, scraped clean, and written on again — with traces of every previous layer still visible beneath the new text. Medieval monks reused expensive vellum this way, and scholars today use imaging technology to read the ghost-text underneath centuries of later writing.</p>
<p>The Cygnet Boardwalk is a palimpsest. Every day, hundreds of people walk the same 100 metres. Most of them walk past each other without making contact. They share the same space, the same view, the same morning light on the Huon River — and they remain strangers. This project asks: what if the surface itself could carry their connection?</p>
<h2>What happens on the boardwalk</h2>
<p>Chalk dance steps — outlines of shoes arranged in old-time dance sequences — mark a 100-metre section of the boardwalk. A chalk station at the midpoint offers coloured chalk and a weekly prompt. Walkers are invited to follow the steps, respond to the prompt, or add their own mark: a word, a drawing, a ribbon of chalk connecting their story to someone else's.</p>
<p>Rain washes the surface clean. Within 24 hours, the dance steps are re-seeded, and the cycle begins again. This is not a failure — it is the design. The ephemeral nature of chalk reduces the stakes of participation. You cannot make a permanent mistake. You cannot ruin anything. You can only add to a surface that is always already in the process of becoming something new.</p>
<h2>The research behind it</h2>
<p>This project is grounded in a growing body of evidence connecting community arts participation to measurable improvements in wellbeing and social connection. Fancourt and Finn's (2019) systematic review of over 900 studies found strong evidence that arts engagement is associated with reduced anxiety and depression, improved social cohesion, and enhanced sense of community identity. Daykin et al. (2018) documented specific mechanisms by which participatory public art reduces isolation, particularly in communities where formal social infrastructure is limited.</p>
<h2>Who is behind it</h2>
<p>The Palimpsest Path is a community wellbeing project led by Peter Shanks, a student in the Bachelor of Creative Arts and Health at the University of Tasmania. It is being conducted as part of FXA301 Arts in the Community, under the supervision of academic staff at UTAS.</p>`

    content: `
<h2>The short version</h2>
<p>This project collects no personal data from walkers. The sensors on the boardwalk count pedestrian movements using infrared beams only — no cameras, no images, no names, no faces. If you submit a photo through this site, you control what happens to it and can request removal at any time.</p>
<hr>
<h2>The sensors</h2>
<p>Two small sensor units are installed at the start and end of the 100-metre gallery section. Each uses an infrared beam to detect when someone crosses it.</p>
<p><strong>What the sensors record:</strong> a timestamp and the time elapsed between the two beam events.</p>
<p><strong>What the sensors do not record:</strong> images, video, faces, voices, device identifiers, Wi-Fi signals, Bluetooth signals, or any information that could identify an individual.</p>
<p>The data is stored locally on an SD card inside each sensor unit. It is not transmitted wirelessly and is not connected to the internet. This is a Privacy by Design architecture — the system is physically incapable of collecting personal data, not merely configured to avoid it.</p>
<hr>

let pageStatuses = {};
let existingPageSlugs = {};
let connected = false;

function getAuth() {
  const user = document.getElementById('wpUser').value.trim();
  const pass = document.getElementById('wpPass').value.trim().replace(/\s+/g, '');
  return 'Basic ' + btoa(user + ':' + pass);
}

function getBase() {
  return document.getElementById('wpUrl').value.trim().replace(/\/$/, '');
}

function log(msg, type = '') {
  const el = document.getElementById('deployLog');
  const line = document.createElement('span');
  line.className = 'line ' + type;
  const ts = new Date().toTimeString().slice(0,8);
  line.textContent = '[' + ts + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('deployLog').innerHTML = '';
}

function setPageStatus(slug, status, link) {
  pageStatuses[slug] = status;
  const row = document.getElementById('row-' + slug);
  if (!row) return;
  const badge = row.querySelector('.status-badge');
  badge.className = 'status-badge badge-' + status;
  const labels = { pending: 'Pending', deploying: 'Deploying...', done: 'Created', exists: 'Updated', error: 'Error', skipped: 'Skipped' };
  badge.textContent = labels[status] || status;
  const linkBtn = row.querySelector('.link-btn');
  if (link && linkBtn) {
    linkBtn.style.display = 'inline-block';
    linkBtn.onclick = () => window.open(link, '_blank');
  }
}

function buildPageList() {
  const list = document.getElementById('pageList');
  list.innerHTML = '';
  PAGES.forEach(p => {
    const row = document.createElement('div');
    row.className = 'page-row';
    row.id = 'row-' + p.slug;
    row.innerHTML = `
      <div>
        <div class="slug">/${p.slug}</div>
        <div class="title">${p.title}</div>
      </div>
      <span class="status-badge badge-pending">Pending</span>
      <button class="link-btn secondary" style="display:none">View</button>`;
    list.appendChild(row);
  });
  pageStatuses = {};
}

function resetStatuses() {
  buildPageList();
  log('Status reset.', 'dim');
}

async function testConnection() {
  const btn = document.getElementById('btnTest');
  const status = document.getElementById('connStatus');
  const statusText = document.getElementById('connText');
  btn.disabled = true;
  status.className = 'conn-status';
  statusText.textContent = 'Testing...';
  clearLog();
  log('Testing connection to ' + getBase(), 'info');
  try {
    const r = await fetch(getBase() + '/wp-json/wp/v2/users/me', {
      headers: { 'Authorization': getAuth() }
    });
    if (r.status === 200) {
      const data = await r.json();
      status.className = 'conn-status ok';
      statusText.textContent = 'Connected as ' + (data.name || data.slug);
      log('Authentication OK — ' + (data.name || data.slug), 'ok');
      connected = true;
      saveCredentials();
      document.getElementById('btnDeploy').disabled = false;
      await fetchExistingPages();
    } else if (r.status === 401) {
      throw new Error('Invalid credentials (401)');
    } else {
      throw new Error('HTTP ' + r.status);
    }
  } catch(e) {
    status.className = 'conn-status err';
    statusText.textContent = 'Failed: ' + e.message;
    log('Connection failed: ' + e.message, 'err');
    connected = false;
    document.getElementById('btnDeploy').disabled = true;
  }
  btn.disabled = false;
}

async function fetchPagesByStatus(status) {
  const found = {};
  let page = 1;
  while (true) {
    const r = await fetch(
      getBase() + '/wp-json/wp/v2/pages?per_page=100&page=' + page + '&status=' + status,
      { headers: { 'Authorization': getAuth() } }
    );
    if (!r.ok) { log('  Fetch status=' + status + ' returned HTTP ' + r.status, 'warn'); break; }
    const pages = await r.json();
    if (!pages.length) break;
    pages.forEach(p => {
        log('  [' + status + '] ' + p.slug + ' (id:' + p.id + ')', 'dim');
        found[p.slug] = p.id;
      });
    page++;
  }
  return found;
}

async function fetchExistingPages() {
  log('Fetching existing pages...', 'dim');
  existingPageSlugs = {};
  try {
    const drafts    = await fetchPagesByStatus('draft');
    const published = await fetchPagesByStatus('publish');
    existingPageSlugs = { ...drafts, ...published }; // published wins on slug conflict
    const count = Object.keys(existingPageSlugs).length;
    log(count + ' existing page(s) found on site.', count > 0 ? 'warn' : 'dim');
    if (count > 0) log('Slugs: ' + Object.keys(existingPageSlugs).join(', '), 'dim');
  } catch(e) {
    log('Could not fetch existing pages: ' + e.message, 'warn');
  }
}

async function startDeploy() {
  if (!connected) { log('Not connected. Run test first.', 'err'); return; }
  const btn = document.getElementById('btnDeploy');
  btn.disabled = true;
  clearLog();
  log('Starting deploy...', 'info');
  await fetchExistingPages();

  const asDraft = document.getElementById('draftOnly').checked;
  const skipExisting = document.getElementById('skipExisting').checked;
  const updateSettings = document.getElementById('updateSiteSettings').checked;

  if (updateSettings) {
    await updateSiteSettings();
  }

  for (const page of PAGES) {
    const existingId = existingPageSlugs[page.slug];
    if (existingId && skipExisting) {
      log('Skipping /' + page.slug + ' (already exists)', 'dim');
      setPageStatus(page.slug, 'skipped', null);
      continue;
    }
    setPageStatus(page.slug, 'deploying', null);
    log('Deploying /' + page.slug + '...', '');
    try {
      const payload = {
        title: page.title,
        slug: page.slug,
        content: page.content,
        status: asDraft ? 'draft' : 'publish',
        menu_order: page.menuOrder
      };
      let r;
      if (existingId) {
        r = await fetch(getBase() + '/wp-json/wp/v2/pages/' + existingId, {
          method: 'POST',
          headers: { 'Authorization': getAuth(), 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } else {
        r = await fetch(getBase() + '/wp-json/wp/v2/pages', {
          method: 'POST',
          headers: { 'Authorization': getAuth(), 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error((err.message || 'HTTP ' + r.status));
      }
      const data = await r.json();
      existingPageSlugs[data.slug] = data.id;
      const link = data.link || '';
      const editLink = getBase() + '/wp-admin/post.php?post=' + data.id + '&action=edit';
      setPageStatus(page.slug, existingId ? 'exists' : 'done', editLink);
      log('  OK — ' + page.title + ' [' + (asDraft ? 'draft' : 'published') + ']', 'ok');
      log('  Edit: ' + editLink, 'dim');
    } catch(e) {
      setPageStatus(page.slug, 'error', null);
      log('  ERROR on /' + page.slug + ': ' + e.message, 'err');
    }
    await new Promise(r => setTimeout(r, 400));
  }
  log('Deploy complete.', 'info');
  btn.disabled = false;
}

async function updateSiteSettings() {
  const title = document.getElementById('siteTitle').value.trim();
  const tagline = document.getElementById('siteTagline').value.trim();
  log('Updating site settings...', '');
  try {
    const r = await fetch(getBase() + '/wp-json/wp/v2/settings', {
      method: 'POST',
      headers: { 'Authorization': getAuth(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description: tagline })
    });
    if (r.ok) {
      log('  Site title: "' + title + '"', 'ok');
      log('  Tagline: "' + tagline + '"', 'ok');
    } else {
      log('  Settings update failed (HTTP ' + r.status + ') — continuing anyway', 'warn');
    }
  } catch(e) {
    log('  Settings update error: ' + e.message + ' — continuing anyway', 'warn');
  }
}

function saveCredentials() {
  localStorage.setItem('pp_wpUrl',  document.getElementById('wpUrl').value.trim());
  localStorage.setItem('pp_wpUser', document.getElementById('wpUser').value.trim());
  localStorage.setItem('pp_wpPass', document.getElementById('wpPass').value.trim());
}

function loadSavedCredentials() {
  const url  = localStorage.getItem('pp_wpUrl');
  const user = localStorage.getItem('pp_wpUser');
  const pass = localStorage.getItem('pp_wpPass');
  if (url)  document.getElementById('wpUrl').value  = url;
  if (user) document.getElementById('wpUser').value = user;
  if (pass) document.getElementById('wpPass').value = pass;
}

buildPageList();
loadSavedCredentials();
</script>
